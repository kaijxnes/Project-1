<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAGR Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="back-link" href="index.html">← All calculators</a>
      <h1 class="page-title">CAGR Calculator</h1>
      <p class="page-subtitle">Compound annual growth rate between a start and end value over N years.</p>
    </header>

    <main class="tool">
      <div class="field-row">
        <div class="field">
          <label for="start">Start value</label>
          <input type="number" id="start" placeholder="0.00" step="any">
        </div>
        <div class="field">
          <label for="end">End value</label>
          <input type="number" id="end" placeholder="0.00" step="any">
        </div>
      </div>
      <div class="field">
        <label for="years">Number of years</label>
        <input type="number" id="years" placeholder="1" step="any" value="1">
      </div>

      <div class="result-box">
        <div class="result-hero">
          <div class="value" id="cagr">0%</div>
          <div class="label">CAGR</div>
        </div>
        <hr class="divider">
        <div class="result-grid">
          <div class="result-row"><span class="r-label">Total growth over period</span><span class="r-value" id="total-growth">0%</span></div>
          <div class="result-row"><span class="r-label">Absolute change</span><span class="r-value" id="abs-change">0.00</span></div>
        </div>
      </div>
    </main>
  </div>
  <script src="cagr.js"></script>
</body>
</html>
