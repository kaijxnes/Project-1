<body>
  <div class="page">
    <header class="site-header">
      <a class="back-link" href="index.html">← All calculators</a>
      <h1 class="page-title">BMI Calculator</h1>
      <p class="page-subtitle">Height and weight → Body Mass Index and category.</p>
    </header>

    <main class="tool">
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="metric">Metric</button>
        <button class="tab" data-tab="imperial">Imperial</button>
      </div>

      <div class="tab-panel active" data-panel="metric">
        <div class="field-row">
          <div class="field">
            <label for="m-height">Height (cm)</label>
            <input type="number" id="m-height" placeholder="0" step="any">
          </div>
          <div class="field">
            <label for="m-weight">Weight (kg)</label>
            <input type="number" id="m-weight" placeholder="0" step="any">
          </div>
        </div>
      </div>

      <div class="tab-panel" data-panel="imperial">
        <div class="field-row">
          <div class="field">
            <label for="i-feet">Height (ft)</label>
            <input type="number" id="i-feet" placeholder="0" step="any">
          </div>
          <div class="field">
            <label for="i-inches">Height (in)</label>
            <input type="number" id="i-inches" placeholder="0" step="any">
          </div>
        </div>
        <div class="field">
          <label for="i-weight">Weight (lb)</label>
          <input type="number" id="i-weight" placeholder="0" step="any">
        </div>
      </div>

      <div class="result-box">
        <div class="result-hero">
          <div class="value" id="bmi-value">—</div>
          <div class="label" id="bmi-category">Enter your height and weight</div>
        </div>
        <hr class="divider">
        <div class="result-grid">
          <div class="result-row"><span class="r-label">Underweight</span><span class="r-value">below 18.5</span></div>
          <div class="result-row"><span class="r-label">Normal weight</span><span class="r-value">18.5 – 24.9</span></div>
          <div class="result-row"><span class="r-label">Overweight</span><span class="r-value">25 – 29.9</span></div>
          <div class="result-row"><span class="r-label">Obese</span><span class="r-value">30 and above</span></div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <p>Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.</p>
    </footer>
  </div>
  <script src="bmi.js"></script>
</body>
</html>
