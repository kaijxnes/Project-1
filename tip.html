<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="back-link" href="index.html">← All calculators</a>
      <h1 class="page-title">Tip Calculator</h1>
      <p class="page-subtitle">Bill amount, tip%, and number of people → tip and per-person total.</p>
    </header>

    <main class="tool">
      <div class="field">
        <label for="bill">Bill amount</label>
        <input type="number" id="bill" placeholder="0.00" step="any">
      </div>

      <div class="field">
        <label>Tip %</label>
        <div class="tabs" id="tip-presets">
          <button class="tab" data-tip="10" type="button">10%</button>
          <button class="tab active" data-tip="15" type="button">15%</button>
          <button class="tab" data-tip="20" type="button">20%</button>
        </div>
        <input type="number" id="tip-percent" placeholder="15" step="any" value="15" style="margin-top:8px;">
      </div>

      <div class="field">
        <label for="people">Number of people</label>
        <input type="number" id="people" placeholder="1" step="1" min="1" value="1">
      </div>

      <div class="result-box">
        <div class="result-grid">
          <div class="result-row"><span class="r-label">Tip amount</span><span class="r-value" id="tip-amount">£0.00</span></div>
          <div class="result-row highlight"><span class="r-label">Total (bill + tip)</span><span class="r-value" id="total">£0.00</span></div>
          <hr class="divider">
          <div class="result-row"><span class="r-label">Tip per person</span><span class="r-value" id="tip-per-person">£0.00</span></div>
          <div class="result-row highlight"><span class="r-label">Total per person</span><span class="r-value" id="total-per-person">£0.00</span></div>
        </div>
      </div>
    </main>
  </div>
  <script src="tip.js"></script>
</body>
</html>
