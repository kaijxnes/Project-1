<body>
  <div class="page">
    <header class="site-header">
      <a class="back-link" href="index.html">← All calculators</a>
      <h1 class="page-title">Discount Calculator</h1>
      <p class="page-subtitle">Original price + % off → final price. Add multiple discounts to stack them sequentially.</p>
    </header>

    <main class="tool">
      <div class="field">
        <label for="original-price">Original price</label>
        <input type="number" id="original-price" placeholder="0.00" step="any">
      </div>

      <div class="dyn-table-head">
        <span class="row-index">#</span>
        <span class="grow">Discount</span>
        <span class="fixed-sm">% off</span>
        <span style="width:34px"></span>
      </div>
      <div class="dyn-list" id="rows"></div>
      <button class="btn btn-ghost" id="add-row" type="button">+ Add discount</button>

      <div class="result-box" style="margin-top:18px;">
        <div class="result-hero">
          <div class="value" id="final-price">£0.00</div>
          <div class="label">Final price</div>
        </div>
        <hr class="divider">
        <div class="result-grid">
          <div class="result-row"><span class="r-label">Total saved</span><span class="r-value" id="total-saved">£0.00</span></div>
          <div class="result-row highlight"><span class="r-label">Effective discount</span><span class="r-value" id="effective-discount">0%</span></div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <p>Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.</p>
    </footer>
  </div>
  <script src="discount.js"></script>
</body>
</html>
