<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Difference Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="back-link" href="index.html">← All calculators</a>
      <h1 class="page-title">Date Difference</h1>
      <p class="page-subtitle">How many years, months and days between two dates.</p>
    </header>

    <main class="tool">
      <div class="field-row">
        <div class="field">
          <label for="dd-start">Start date</label>
          <input type="date" id="dd-start">
        </div>
        <div class="field">
          <label for="dd-end">End date</label>
          <input type="date" id="dd-end">
        </div>
      </div>

      <div class="result-box">
        <div class="result-hero">
          <div class="value" id="dd-value">—</div>
          <div class="label">Difference</div>
        </div>
        <hr class="divider">
        <div class="result-grid">
          <div class="result-row"><span class="r-label">Total days</span><span class="r-value" id="dd-days">—</span></div>
          <div class="result-row"><span class="r-label">Total weeks</span><span class="r-value" id="dd-weeks">—</span></div>
          <div class="result-row"><span class="r-label">Total months</span><span class="r-value" id="dd-months">—</span></div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <p>Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.</p>
    </footer>
  </div>
  <script src="date-diff.js"></script>
</body>
</html>
