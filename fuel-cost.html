<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5GSHPQLBZW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-5GSHPQLBZW');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Cost Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="back-link" href="index.html">← All calculators</a>
      <h1 class="page-title">Fuel Cost / MPG</h1>
      <p class="page-subtitle">Distance, fuel price and efficiency → what a trip will cost you.</p>
    </header>

    <main class="tool">
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="mpg">MPG (miles/gallon)</button>
        <button class="tab" data-tab="l100km">L/100km</button>
      </div>

      <div class="tab-panel active" data-panel="mpg">
        <div class="field">
          <label for="mpg-distance">Trip distance (miles)</label>
          <input type="number" id="mpg-distance" placeholder="0" step="any">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="mpg-efficiency">Efficiency (MPG)</label>
            <input type="number" id="mpg-efficiency" placeholder="0" step="any">
          </div>
          <div class="field">
            <label for="mpg-price">Fuel price (per gallon)</label>
            <input type="number" id="mpg-price" placeholder="0.00" step="any">
          </div>
        </div>
        <div class="result-box">
          <div class="result-hero">
            <div class="value" id="mpg-cost">£0.00</div>
            <div class="label">Trip cost</div>
          </div>
          <hr class="divider">
          <div class="result-grid">
            <div class="result-row"><span class="r-label">Fuel needed</span><span class="r-value" id="mpg-fuel">0.00 gal</span></div>
          </div>
        </div>
      </div>

      <div class="tab-panel" data-panel="l100km">
        <div class="field">
          <label for="l100-distance">Trip distance (km)</label>
          <input type="number" id="l100-distance" placeholder="0" step="any">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="l100-efficiency">Efficiency (L/100km)</label>
            <input type="number" id="l100-efficiency" placeholder="0" step="any">
          </div>
          <div class="field">
            <label for="l100-price">Fuel price (per litre)</label>
            <input type="number" id="l100-price" placeholder="0.00" step="any">
          </div>
        </div>
        <div class="result-box">
          <div class="result-hero">
            <div class="value" id="l100-cost">£0.00</div>
            <div class="label">Trip cost</div>
          </div>
          <hr class="divider">
          <div class="result-grid">
            <div class="result-row"><span class="r-label">Fuel needed</span><span class="r-value" id="l100-fuel">0.00 L</span></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <p>Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.</p>
    </footer>
  </div>
  <script src="fuel-cost.js"></script>
</body>
</html>
