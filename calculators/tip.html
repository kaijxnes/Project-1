<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tip Calculator — CalcHub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="logo">🧮</span>
      CalcHub
    </a>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <a class="back-link" href="../index.html">← All calculators</a>
    <div class="calc-wrap">
      <h1>Tip Calculator</h1>
      <p class="subtitle">Work out the tip and split the bill.</p>

      <div class="field">
        <label for="bill">Bill amount</label>
        <input type="number" id="bill" placeholder="e.g. 84.50" min="0" step="0.01" />
      </div>

      <div class="row">
        <div class="field">
          <label for="tip-percent">Tip percent</label>
          <input type="number" id="tip-percent" value="15" min="0" step="1" />
        </div>
        <div class="field">
          <label for="people">Split between</label>
          <input type="number" id="people" value="1" min="1" step="1" />
        </div>
      </div>

      <div class="result-list">
        <div class="item"><span>Tip amount</span><span id="tip-amount">$0.00</span></div>
        <div class="item"><span>Total bill</span><span id="total-amount">$0.00</span></div>
        <div class="item"><span>Per person</span><span id="per-person">$0.00</span></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.
  </footer>

  <script src="../js/tip.js"></script>
</body>
</html>
