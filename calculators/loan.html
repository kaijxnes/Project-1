<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan / Mortgage Calculator — CalcHub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="logo">🧮</span>
      CalcHub
    </a>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <a class="back-link" href="../index.html">← All calculators</a>
    <div class="calc-wrap">
      <h1>Loan / Mortgage Calculator</h1>
      <p class="subtitle">Estimate your monthly payment and total interest.</p>

      <div class="field">
        <label for="principal">Loan amount</label>
        <input type="number" id="principal" placeholder="e.g. 250000" min="0" step="100" />
      </div>

      <div class="row">
        <div class="field">
          <label for="rate">Annual interest rate (%)</label>
          <input type="number" id="rate" placeholder="e.g. 5.5" min="0" step="0.01" />
        </div>
        <div class="field">
          <label for="years">Term (years)</label>
          <input type="number" id="years" placeholder="e.g. 30" min="1" step="1" />
        </div>
      </div>

      <div class="result-list">
        <div class="item"><span>Monthly payment</span><span id="monthly-payment">—</span></div>
        <div class="item"><span>Total paid</span><span id="total-paid">—</span></div>
        <div class="item"><span>Total interest</span><span id="total-interest">—</span></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.
  </footer>

  <script src="../js/loan.js"></script>
</body>
</html>
