<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discount Calculator — CalcHub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="logo">🧮</span>
      CalcHub
    </a>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <a class="back-link" href="../index.html">← All calculators</a>
    <div class="calc-wrap">
      <h1>Discount Calculator</h1>
      <p class="subtitle">Find the sale price and how much you save.</p>

      <div class="row">
        <div class="field">
          <label for="price">Original price</label>
          <input type="number" id="price" placeholder="e.g. 80" min="0" step="0.01" />
        </div>
        <div class="field">
          <label for="discount">Discount (%)</label>
          <input type="number" id="discount" placeholder="e.g. 25" min="0" max="100" step="1" />
        </div>
      </div>

      <div class="result-list">
        <div class="item"><span>You save</span><span id="savings">—</span></div>
        <div class="item"><span>Sale price</span><span id="sale-price">—</span></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.
  </footer>

  <script src="../js/discount.js"></script>
</body>
</html>
