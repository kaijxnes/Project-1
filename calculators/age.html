<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator — CalcHub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="logo">🧮</span>
      CalcHub
    </a>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <a class="back-link" href="../index.html">← All calculators</a>
    <div class="calc-wrap">
      <h1>Age Calculator</h1>
      <p class="subtitle">Find your exact age or the days between two dates.</p>

      <div class="row">
        <div class="field">
          <label for="birth-date">Date of birth</label>
          <input type="date" id="birth-date" />
        </div>
        <div class="field">
          <label for="target-date">As of</label>
          <input type="date" id="target-date" />
        </div>
      </div>

      <div class="result-list">
        <div class="item"><span>Age</span><span id="age-result">—</span></div>
        <div class="item"><span>Total days</span><span id="total-days">—</span></div>
        <div class="item"><span>Total weeks</span><span id="total-weeks">—</span></div>
        <div class="item"><span>Next birthday in</span><span id="next-birthday">—</span></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.
  </footer>

  <script src="../js/age.js"></script>
</body>
</html>
