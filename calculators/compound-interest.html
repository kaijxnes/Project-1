<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compound Interest Calculator — CalcHub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="logo">🧮</span>
      CalcHub
    </a>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <a class="back-link" href="../index.html">← All calculators</a>
    <div class="calc-wrap">
      <h1>Compound Interest Calculator</h1>
      <p class="subtitle">See how savings or investments grow over time.</p>

      <div class="row">
        <div class="field">
          <label for="principal">Initial amount</label>
          <input type="number" id="principal" placeholder="e.g. 5000" min="0" step="1" />
        </div>
        <div class="field">
          <label for="contribution">Monthly contribution</label>
          <input type="number" id="contribution" placeholder="e.g. 200" min="0" step="1" value="0" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="rate">Annual interest rate (%)</label>
          <input type="number" id="rate" placeholder="e.g. 7" min="0" step="0.01" />
        </div>
        <div class="field">
          <label for="years">Years</label>
          <input type="number" id="years" placeholder="e.g. 10" min="1" step="1" />
        </div>
      </div>

      <div class="field">
        <label for="frequency">Compounding frequency</label>
        <select id="frequency">
          <option value="12">Monthly</option>
          <option value="4">Quarterly</option>
          <option value="1">Annually</option>
          <option value="365">Daily</option>
        </select>
      </div>

      <div class="result-list">
        <div class="item"><span>Total contributed</span><span id="total-contributed">—</span></div>
        <div class="item"><span>Total interest earned</span><span id="total-interest">—</span></div>
        <div class="item"><span>Final balance</span><span id="final-balance">—</span></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.
  </footer>

  <script src="../js/compound-interest.js"></script>
</body>
</html>
