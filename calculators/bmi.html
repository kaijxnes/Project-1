<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI Calculator — CalcHub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="logo">🧮</span>
      CalcHub
    </a>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <a class="back-link" href="../index.html">← All calculators</a>
    <div class="calc-wrap">
      <h1>BMI Calculator</h1>
      <p class="subtitle">Check your body mass index from height &amp; weight.</p>

      <div class="field">
        <label for="units">Units</label>
        <select id="units">
          <option value="metric">Metric (cm, kg)</option>
          <option value="imperial">Imperial (in, lb)</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="height" id="height-label">Height (cm)</label>
          <input type="number" id="height" placeholder="e.g. 175" min="0" step="0.1" />
        </div>
        <div class="field">
          <label for="weight" id="weight-label">Weight (kg)</label>
          <input type="number" id="weight" placeholder="e.g. 70" min="0" step="0.1" />
        </div>
      </div>

      <div class="result">
        <div class="value" id="bmi-value">—</div>
        <div class="label" id="bmi-category"></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.
  </footer>

  <script src="../js/bmi.js"></script>
</body>
</html>
