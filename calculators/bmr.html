<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calorie (BMR) Calculator — CalcHub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="logo">🧮</span>
      CalcHub
    </a>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <a class="back-link" href="../index.html">← All calculators</a>
    <div class="calc-wrap">
      <h1>Calorie (BMR) Calculator</h1>
      <p class="subtitle">Estimate your daily calorie needs using the Mifflin-St Jeor formula.</p>

      <div class="field">
        <label for="sex">Sex</label>
        <select id="sex">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="age">Age (years)</label>
          <input type="number" id="age" placeholder="e.g. 30" min="1" step="1" />
        </div>
        <div class="field">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" placeholder="e.g. 175" min="0" step="0.1" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" placeholder="e.g. 70" min="0" step="0.1" />
        </div>
        <div class="field">
          <label for="activity">Activity level</label>
          <select id="activity">
            <option value="1.2">Sedentary</option>
            <option value="1.375">Light exercise</option>
            <option value="1.55" selected>Moderate exercise</option>
            <option value="1.725">Heavy exercise</option>
            <option value="1.9">Athlete</option>
          </select>
        </div>
      </div>

      <div class="result-list">
        <div class="item"><span>BMR (resting)</span><span id="bmr-value">—</span></div>
        <div class="item"><span>Daily calories (maintenance)</span><span id="tdee-value">—</span></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.
  </footer>

  <script src="../js/bmr.js"></script>
</body>
</html>
