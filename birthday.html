<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5GSHPQLBZW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-5GSHPQLBZW');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="back-link" href="index.html">← All calculators</a>
      <h1 class="page-title">Birthday Calculator</h1>
      <p class="page-subtitle">Your exact age, the day you were born, and how long until your next birthday.</p>
    </header>

    <main class="tool">
      <div class="field">
        <label for="dob">Date of birth</label>
        <input type="date" id="dob">
      </div>

      <div class="result-box">
        <div class="result-hero">
          <div class="value" id="age-value">—</div>
          <div class="label">Current age</div>
        </div>
        <hr class="divider">
        <div class="result-grid">
          <div class="result-row"><span class="r-label">Born on a</span><span class="r-value" id="birth-weekday">—</span></div>
          <div class="result-row"><span class="r-label">Total days lived</span><span class="r-value" id="days-lived">—</span></div>
          <div class="result-row highlight"><span class="r-label">Next birthday in</span><span class="r-value" id="days-until">—</span></div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <p>Built with plain HTML, CSS &amp; JavaScript — all calculations run locally in your browser.</p>
    </footer>
  </div>
  <script src="birthday.js"></script>
</body>
</html>
